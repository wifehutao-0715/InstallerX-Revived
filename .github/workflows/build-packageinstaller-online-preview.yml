name: Build PackageInstaller Online Preview APKs

on:
  schedule:
    # Checks the upstream dev branch daily at 00:00 Asia/Hong_Kong (16:00 UTC).
    - cron: '0 16 * * *'
  workflow_dispatch:
    inputs:
      source_repository:
        description: 'Repository to build from'
        required: false
        default: 'wxxsfxyzm/InstallerX-Revived'
      source_ref:
        description: 'Branch, tag, or commit SHA to build'
        required: false
        default: 'dev'
      force_rebuild:
        description: 'Build even if this source commit was already built'
        required: false
        default: 'false'
      version_name:
        description: 'Optional VERSION_NAME override, for example 26.03 or 26.03.01'
        required: false
        default: ''
      retention_days:
        description: 'Artifact retention days'
        required: false
        default: '30'

permissions:
  contents: read
  packages: read

jobs:
  preflight:
    name: Check upstream commit
    runs-on: ubuntu-latest
    outputs:
      cache_hit: ${{ steps.restore-marker.outputs.cache-hit }}
      should_build: ${{ steps.decision.outputs.should_build }}
      source_repository: ${{ steps.source.outputs.repository }}
      source_ref: ${{ steps.source.outputs.ref }}
      upstream_sha: ${{ steps.sha.outputs.upstream_sha }}
      version_name: ${{ steps.source.outputs.version_name }}
      retention_days: ${{ steps.source.outputs.retention_days }}

    steps:
      - name: Resolve source
        id: source
        env:
          SOURCE_REPOSITORY: ${{ github.event.inputs.source_repository }}
          SOURCE_REF: ${{ github.event.inputs.source_ref }}
          VERSION_NAME: ${{ github.event.inputs.version_name }}
          RETENTION_DAYS: ${{ github.event.inputs.retention_days }}
        run: |
          echo "repository=${SOURCE_REPOSITORY:-wxxsfxyzm/InstallerX-Revived}" >> "$GITHUB_OUTPUT"
          echo "ref=${SOURCE_REF:-dev}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME:-}" >> "$GITHUB_OUTPUT"
          echo "retention_days=${RETENTION_DAYS:-30}" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.source.outputs.repository }}
          fetch-depth: 1
          ref: ${{ steps.source.outputs.ref }}

      - name: Get source commit
        id: sha
        run: echo "upstream_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore successful-build marker
        id: restore-marker
        uses: actions/cache/restore@v4
        with:
          path: .ci-cache/packageinstaller-online-preview
          key: packageinstaller-online-preview-${{ steps.sha.outputs.upstream_sha }}

      - name: Decide whether to build
        id: decision
        env:
          CACHE_HIT: ${{ steps.restore-marker.outputs.cache-hit }}
          FORCE_REBUILD: ${{ github.event.inputs.force_rebuild }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          SHOULD_BUILD=true

          if [ "${CACHE_HIT}" = "true" ]; then
            if [ "${EVENT_NAME}" = "schedule" ]; then
              SHOULD_BUILD=false
            elif [ "${FORCE_REBUILD:-true}" != "true" ]; then
              SHOULD_BUILD=false
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"
          echo "Source commit: ${{ steps.sha.outputs.upstream_sha }}"
          echo "Cache hit: ${CACHE_HIT:-false}"
          echo "Should build: ${SHOULD_BUILD}"

  build:
    name: ${{ matrix.label }}
    needs: preflight
    if: needs.preflight.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: AOSP Package Installer
            module_variant: AOSP
            artifact_suffix: android-packageinstaller
            app_id: com.android.packageinstaller
          - label: Google Package Installer
            module_variant: Google
            artifact_suffix: google-packageinstaller
            app_id: com.google.android.packageinstaller

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.preflight.outputs.source_repository }}
          fetch-depth: 0
          ref: ${{ needs.preflight.outputs.upstream_sha }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '25'

      - name: Use CI-provided JDK for Gradle
        run: rm -f gradle/gradle-daemon-jvm.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"
          build-scan-publish: false
          cache-read-only: ${{ github.ref_name != 'main' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Decode and set up signing key
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            echo "Signing secrets are incomplete. The project will fall back to the debug keystore."
            exit 0
          fi

          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build online preview APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_ID: ${{ matrix.app_id }}
          VERSION_NAME: ${{ needs.preflight.outputs.version_name }}
        run: |
          VERSION_ARG=""
          if [ -n "${VERSION_NAME:-}" ]; then
            VERSION_ARG="-PVERSION_NAME=${VERSION_NAME}"
          fi

          ./gradlew assembleOnlinePreviewRelease -PAPP_ID="${APP_ID}" ${VERSION_ARG}

      - name: Rename APK
        id: apk
        env:
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
          APP_ID: ${{ matrix.app_id }}
          VERSION_NAME: ${{ needs.preflight.outputs.version_name }}
        run: |
          APK_DIR="app/build/outputs/apk/onlinePreview/release"
          ORIGINAL_APK=$(find "$APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)

          if [ -z "$ORIGINAL_APK" ]; then
            echo "ERROR: APK not found in $APK_DIR"
            ls -R app/build/outputs/apk || true
            exit 1
          fi

          if [ -n "${VERSION_NAME:-}" ]; then
            VERSION_TAG="${VERSION_NAME}"
          else
            VERSION_TAG="$(git log -1 --format=%cd --date=format:%y.%m)"
          fi

          SAFE_APP_ID="${APP_ID//./-}"
          NEW_APK_NAME="InstallerX-Revived-online-preview-${ARTIFACT_SUFFIX}-${VERSION_TAG}.apk"
          NEW_APK_PATH="${APK_DIR}/${NEW_APK_NAME}"

          mv "$ORIGINAL_APK" "$NEW_APK_PATH"

          echo "apk_path=${NEW_APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${NEW_APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "app_id=${APP_ID}" >> "$GITHUB_OUTPUT"
          echo "safe_app_id=${SAFE_APP_ID}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build module ZIP
        id: module
        env:
          APK_PATH: ${{ steps.apk.outputs.apk_path }}
          APP_ID: ${{ matrix.app_id }}
          MODULE_VARIANT: ${{ matrix.module_variant }}
          VERSION_TAG: ${{ steps.apk.outputs.version_tag }}
        run: |
          MODULE_ROOT="module-output/${MODULE_VARIANT}"
          MODULE_ZIP_NAME="${MODULE_VARIANT}-${VERSION_TAG}-online-preview.zip"
          MODULE_ZIP_PATH="module-output/${MODULE_ZIP_NAME}"
          VERSION_CODE="$(git rev-list --count HEAD)"

          rm -rf "$MODULE_ROOT"
          mkdir -p "$MODULE_ROOT/META-INF/com/google/android"
          mkdir -p "$MODULE_ROOT/system/priv-app/PackageInstaller/lib"
          mkdir -p "$MODULE_ROOT/system/priv-app/PackageInstaller/oat"

          cp "$APK_PATH" "$MODULE_ROOT/system/priv-app/PackageInstaller/PackageInstaller.apk"

          cat > "$MODULE_ROOT/module.prop" <<EOF
          id=${APP_ID}
          name=InstallerX Revived
          version=${VERSION_TAG}
          versionCode=${VERSION_CODE}
          author=wxxsfxyzm
          description=InstallerX as System Package Installer (${MODULE_VARIANT}, online preview)
          EOF

          cat > "$MODULE_ROOT/customize.sh" <<'EOF'
          # This ensures Magisk extracts the module files automatically
          SKIPUNZIP=0

          ui_print "- Installing PackageInstaller Replacement..."
          ui_print "- Setting permissions..."
          set_perm_recursive "$MODPATH/system" 0 0 0755 0644
          EOF

          cat > "$MODULE_ROOT/service.sh" <<'EOF'
          #!/system/bin/sh
          rm -rf /data/system/package_cache/*
          rm "$0"
          EOF

          cat > "$MODULE_ROOT/uninstall.sh" <<'EOF'
          #!/system/bin/sh
          rm -rf /data/system/package_cache/*
          EOF

          cat > "$MODULE_ROOT/action.sh" <<EOF
          #!/system/bin/sh
          am start -n ${APP_ID}/com.rosan.installer.ui.activity.SettingsActivity
          EOF

          cat > "$MODULE_ROOT/META-INF/com/google/android/update-binary" <<'EOF'
          #!/sbin/sh

          umask 022

          ui_print() { echo "$1"; }

          require_new_magisk() {
            ui_print "*******************************"
            ui_print " Please install Magisk v20.4+! "
            ui_print "*******************************"
            exit 1
          }

          OUTFD=$2
          ZIPFILE=$3

          mount /data 2>/dev/null

          [ -f /data/adb/magisk/util_functions.sh ] || require_new_magisk
          . /data/adb/magisk/util_functions.sh
          [ $MAGISK_VER_CODE -lt 20400 ] && require_new_magisk

          install_module
          exit 0
          EOF

          cat > "$MODULE_ROOT/META-INF/com/google/android/updater-script" <<'EOF'
          #MAGISK
          EOF

          chmod 0755 "$MODULE_ROOT/action.sh" "$MODULE_ROOT/customize.sh" "$MODULE_ROOT/service.sh" "$MODULE_ROOT/uninstall.sh" "$MODULE_ROOT/META-INF/com/google/android/update-binary"
          find "$MODULE_ROOT/system" -type d -exec chmod 0755 {} \;
          find "$MODULE_ROOT/system" -type f -exec chmod 0644 {} \;

          (cd "$MODULE_ROOT" && zip -r "../${MODULE_ZIP_NAME}" .)

          echo "module_path=${MODULE_ZIP_PATH}" >> "$GITHUB_OUTPUT"
          echo "module_name=${MODULE_ZIP_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk.outputs.safe_app_id }}-online-preview-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: ${{ needs.preflight.outputs.retention_days }}
          archive: false

      - name: Upload module ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.module_variant }}-${{ steps.apk.outputs.version_tag }}-online-preview-module
          path: ${{ steps.module.outputs.module_path }}
          retention-days: ${{ needs.preflight.outputs.retention_days }}
          archive: false

  remember-success:
    name: Remember successful source commit
    needs:
      - preflight
      - build
    if: needs.preflight.outputs.should_build == 'true' && needs.preflight.outputs.cache_hit != 'true' && success()
    runs-on: ubuntu-latest

    steps:
      - name: Create successful-build marker
        run: |
          mkdir -p .ci-cache
          echo "${{ needs.preflight.outputs.upstream_sha }}" > .ci-cache/packageinstaller-online-preview

      - name: Save successful-build marker
        uses: actions/cache/save@v4
        with:
          path: .ci-cache/packageinstaller-online-preview
          key: packageinstaller-online-preview-${{ needs.preflight.outputs.upstream_sha }}
