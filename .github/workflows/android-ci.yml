name: Android CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - dev
  schedule:
    - cron: '0 16 * * *'
    - cron: '20 16 * * *'
    - cron: '40 16 * * *'
    - cron: '30 1 * * 0'
  workflow_dispatch:
    inputs:
      target:
        description: 'Manual target to run'
        required: true
        default: 'packageinstaller'
        type: choice
        options:
          - packageinstaller
          - preview-release
          - stable-release
          - dev-artifact
          - pr-debug
          - codeql
      package_channel:
        description: 'PackageInstaller channel'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - stable
          - unstable
      source_repository:
        description: 'Repository to build PackageInstaller APKs from; defaults to upstream for freshness'
        required: false
        default: 'wxxsfxyzm/InstallerX-Revived'
      source_ref:
        description: 'Branch, tag, or commit SHA; use latest-stable for stable'
        required: false
        default: ''
      force_rebuild:
        description: 'Build even if this source commit was already built'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      version_name:
        description: 'Optional VERSION_NAME override'
        required: false
        default: ''
      release_version_tag:
        description: 'Stable release tag, for example 26.03 or 26.03.01'
        required: false
        default: ''
      app_version_code_prefix:
        description: 'Prefix prepended to APK versionCode for direct installation'
        required: false
        default: '99999'
      retention_days:
        description: 'Artifact retention days'
        required: false
        default: '30'

permissions:
  contents: read
  packages: read

jobs:
  changes:
    name: Detect Android changes
    runs-on: ubuntu-latest
    outputs:
      android_changed: ${{ steps.filter.outputs.android_changed }}
    steps:
      - name: Checkout repository
        if: github.event_name == 'push'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check changed paths
        id: filter
        run: |
          if [ "${{ github.event_name }}" != "push" ]; then
            echo "android_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          if [ -z "$BEFORE" ] || [[ "$BEFORE" =~ ^0+$ ]]; then
            echo "android_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          ANDROID_CHANGED=false
          while IFS= read -r file; do
            case "$file" in
              app/*|build.gradle.kts|settings.gradle.kts|gradle.properties|gradle/*|.github/workflows/android-ci.yml|.github/scripts/*)
                ANDROID_CHANGED=true
                break
                ;;
            esac
          done < <(git diff --name-only "$BEFORE" "${{ github.sha }}")

          echo "android_changed=${ANDROID_CHANGED}" >> "$GITHUB_OUTPUT"

  dev-artifact:
    name: Dev artifact
    needs: changes
    if: >
      (github.event_name == 'push' &&
        github.ref_name != 'main' &&
        github.ref_name != 'weblate-dev' &&
        needs.changes.outputs.android_changed == 'true' &&
        !contains(github.event.head_commit.message, '[skip dev]')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'dev-artifact')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit short SHA
        id: commit_sha
        run: echo "SHORT_SHA=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false
          cache-read-only: ${{ github.ref_name != 'dev' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode and set up signing key
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            echo "Signing secrets are incomplete. The project will fall back to the debug keystore."
            exit 0
          fi
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Build Dev Release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_CODE_PREFIX: ${{ inputs.app_version_code_prefix || '99999' }}
        run: ./gradlew assembleOnlineUnstableRelease assembleOfflineUnstableRelease

      - name: Upload Online APK
        uses: actions/upload-artifact@v7
        with:
          name: dev-online-apk-${{ steps.commit_sha.outputs.SHORT_SHA }}
          path: app/build/outputs/apk/onlineUnstable/release/*.apk
          retention-days: ${{ inputs.retention_days || '15' }}
          archive: false

      - name: Upload Offline APK
        uses: actions/upload-artifact@v7
        with:
          name: dev-offline-apk-${{ steps.commit_sha.outputs.SHORT_SHA }}
          path: app/build/outputs/apk/offlineUnstable/release/*.apk
          retention-days: ${{ inputs.retention_days || '15' }}
          archive: false

  preview-release:
    name: Preview pre-release
    needs: changes
    if: >
      (github.event_name == 'push' &&
        github.ref_name == 'main' &&
        needs.changes.outputs.android_changed == 'true' &&
        !startsWith(github.event.head_commit.message, 'chore: bump version') &&
        !startsWith(github.event.head_commit.message, 'chore(release)') &&
        !contains(github.event.head_commit.message, '[skip preview]')) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'preview-release')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get commit short SHA and date
        id: vars
        run: |
          echo "SHORT_SHA=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          echo "YY_MM=$(date +'%y.%m')" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false
          cache-read-only: false
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Decode and set up signing key
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            echo "Signing secrets are incomplete. The project will fall back to the debug keystore."
            exit 0
          fi
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Build Preview Release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_CODE_PREFIX: ${{ inputs.app_version_code_prefix || '99999' }}
        run: ./gradlew assembleOnlinePreviewRelease assembleOfflinePreviewRelease

      - name: Find and rename Preview APKs
        id: rename_apks
        run: |
          PROJECT_NAME="InstallerX-Revived"
          VERSION_TAG="${{ steps.vars.outputs.YY_MM }}.${{ steps.vars.outputs.SHORT_SHA }}"
          ONLINE_APK_DIR="app/build/outputs/apk/onlinePreview/release"
          OFFLINE_APK_DIR="app/build/outputs/apk/offlinePreview/release"

          ONLINE_APK_PATH=$(find "$ONLINE_APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)
          OFFLINE_APK_PATH=$(find "$OFFLINE_APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)

          if [ -z "$ONLINE_APK_PATH" ] || [ -z "$OFFLINE_APK_PATH" ]; then
            echo "ERROR: Could not find both APKs."
            ls -R app/build/outputs/apk || true
            exit 1
          fi

          NEW_ONLINE_APK_PATH="${ONLINE_APK_DIR}/${PROJECT_NAME}-online-${VERSION_TAG}.apk"
          NEW_OFFLINE_APK_PATH="${OFFLINE_APK_DIR}/${PROJECT_NAME}-offline-${VERSION_TAG}.apk"
          mv "$ONLINE_APK_PATH" "$NEW_ONLINE_APK_PATH"
          mv "$OFFLINE_APK_PATH" "$NEW_OFFLINE_APK_PATH"

          echo "online_apk=${NEW_ONLINE_APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "offline_apk=${NEW_OFFLINE_APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Delete old preview release and tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(git tag --list --sort=-creatordate | grep -E '^[0-9]+\.[0-9]+\.[a-f0-9]{7,}$' | head -n 1)
          if [ -n "$LATEST_TAG" ]; then
            gh release delete "$LATEST_TAG" --yes || echo "No previous preview release found to delete."
            git push origin --delete "$LATEST_TAG" || echo "No previous preview tag found to delete."
          else
            echo "No preview tag to delete."
          fi

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' | sort -Vr | head -n 1)
          CURR_TAG="${{ steps.rename_apks.outputs.version_tag }}"

          if [ -z "$PREV_TAG" ]; then
            LOG_RANGE=""
          else
            LOG_RANGE="$PREV_TAG..HEAD"
          fi

          CHANGELOG_LIST=$(git log $LOG_RANGE --pretty=format:"- %s (%an)" | grep -v '^-\s*Merge' | head -n 5 || true)
          CHANGELOG_COUNT=$(git log $LOG_RANGE --pretty=format:"- %s (%an)" | grep -v '^-\s*Merge' | wc -l)

          if [ -z "$CHANGELOG_LIST" ]; then
            CHANGELOG_BODY_OUTPUT="No changes since the last stable release."
          else
            CHANGELOG_BODY_OUTPUT="$CHANGELOG_LIST"
          fi

          CHANGELOG_LINK_OUTPUT=""
          if [ "$CHANGELOG_COUNT" -gt 5 ]; then
            if [ -z "$PREV_TAG" ]; then
              COMPARE_URL="https://github.com/${{ github.repository }}/commits/main"
            else
              COMPARE_URL="https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${CURR_TAG}"
            fi
            CHANGELOG_LINK_OUTPUT="\n\n**Full Changelog:** [\`${PREV_TAG}...${CURR_TAG}\`]($COMPARE_URL)"
          fi

          {
            echo "changelog_body<<EOF"
            echo -e "$CHANGELOG_BODY_OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "changelog_full_link<<EOF"
            echo -e "$CHANGELOG_LINK_OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create latest Preview release
        uses: softprops/action-gh-release@v3
        with:
          name: InstallerX Revived Preview (${{ steps.vars.outputs.SHORT_SHA }})
          tag_name: ${{ steps.rename_apks.outputs.version_tag }}
          target_commitish: ${{ github.sha }}
          body: |
            ## Automatically built latest Preview release
            - This is a pre-release version and is not intended for production use.
            - APK versionCode is prefixed with 99999 for direct-install builds.

            ## Changelog
            ${{ steps.changelog.outputs.changelog_body }}${{ steps.changelog.outputs.changelog_full_link }}
          prerelease: true
          files: |
            ${{ steps.rename_apks.outputs.online_apk }}
            ${{ steps.rename_apks.outputs.offline_apk }}

      - name: Upload to Telegram
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          BOT_CI_SESSION: ${{ secrets.BOT_CI_SESSION }}
        run: |
          if [ -z "${API_ID:-}" ] || [ -z "${API_HASH:-}" ] || [ -z "${BOT_TOKEN:-}" ] || [ -z "${CHAT_ID:-}" ] || [ -z "${BOT_CI_SESSION:-}" ]; then
            echo "Telegram secrets are incomplete. Skipping upload."
            exit 0
          fi
          pip3 install telethon
          python3 .github/bot.py "${{ steps.rename_apks.outputs.online_apk }}" "${{ steps.rename_apks.outputs.offline_apk }}"

  stable-release:
    name: Manual stable release
    if: github.event_name == 'workflow_dispatch' && inputs.target == 'stable-release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate release tag
        env:
          VERSION_TAG: ${{ inputs.release_version_tag }}
        run: |
          if [ -z "${VERSION_TAG:-}" ]; then
            echo "release_version_tag is required for stable-release."
            exit 1
          fi

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false
          cache-read-only: true

      - name: Verify keystore
        run: |
          if [ -z "${{ secrets.SIGNING_KEY_STORE_BASE64 }}" ]; then
            echo "ERROR: SIGNING_KEY_STORE_BASE64 secret is missing."
            exit 1
          fi

      - name: Setup signing keys
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            echo "ERROR: Signing secrets are incomplete."
            exit 1
          fi
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Stable Release APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_CODE_PREFIX: ${{ inputs.app_version_code_prefix || '99999' }}
        run: ./gradlew assembleOnlineStableRelease assembleOfflineStableRelease -PVERSION_NAME="${{ inputs.release_version_tag }}"

      - name: Find and rename Stable APKs
        run: |
          PROJECT_NAME="InstallerX-Revived"
          VERSION_TAG="${{ inputs.release_version_tag }}"

          for FLAVOR in online offline; do
            APK_DIR="app/build/outputs/apk/${FLAVOR}Stable/release"
            ORIGINAL_APK=$(find "$APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)

            if [ -z "$ORIGINAL_APK" ]; then
              echo "ERROR: APK not found in $APK_DIR."
              ls -R app/build/outputs/apk || true
              exit 1
            fi

            NEW_APK_PATH="${APK_DIR}/${PROJECT_NAME}-${FLAVOR}-${VERSION_TAG}.apk"
            mv "$ORIGINAL_APK" "$NEW_APK_PATH"
          done

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: InstallerX Revived stable ${{ inputs.release_version_tag }}
          tag_name: ${{ inputs.release_version_tag }}
          draft: true
          prerelease: false
          generate_release_notes: false
          files: |
            app/build/outputs/apk/onlineStable/release/InstallerX-Revived-online-${{ inputs.release_version_tag }}.apk
            app/build/outputs/apk/offlineStable/release/InstallerX-Revived-offline-${{ inputs.release_version_tag }}.apk

  pr-debug:
    name: PR build and test check
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pr-debug')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build preview debug APKs
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_CODE_PREFIX: ${{ inputs.app_version_code_prefix || '99999' }}
        run: ./gradlew assembleOnlinePreviewDebug assembleOfflinePreviewDebug -PAPP_ID="com.rosan.installer.x.revived.test"

      - name: Upload Online Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pr-online-debug-apk-${{ github.event.pull_request.head.sha || github.sha }}
          path: app/build/outputs/apk/onlinePreview/debug/*.apk
          retention-days: 7
          archive: false

      - name: Upload Offline Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: pr-offline-debug-apk-${{ github.event.pull_request.head.sha || github.sha }}
          path: app/build/outputs/apk/offlinePreview/debug/*.apk
          retention-days: 7
          archive: false

  codeql:
    name: CodeQL
    if: >
      (github.event_name == 'pull_request' && github.head_ref != 'weblate-dev') ||
      (github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'dev')) ||
      (github.event_name == 'schedule' && github.event.schedule == '30 1 * * 0') ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'codeql')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language:
          - java-kotlin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false
          cache-read-only: true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Android project
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew assembleOnlinePreviewDebug --no-daemon

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  packageinstaller-preflight:
    name: PackageInstaller preflight
    if: >
      (github.event_name == 'schedule' && contains(fromJSON('["0 16 * * *","20 16 * * *","40 16 * * *"]'), github.event.schedule)) ||
      (github.event_name == 'workflow_dispatch' && inputs.target == 'packageinstaller')
    runs-on: ubuntu-latest
    outputs:
      cache_hit: ${{ steps.restore-marker.outputs.cache-hit }}
      should_build: ${{ steps.decision.outputs.should_build }}
      source_repository: ${{ steps.source.outputs.repository }}
      source_ref: ${{ steps.stable-ref.outputs.ref }}
      upstream_sha: ${{ steps.sha.outputs.upstream_sha }}
      version_name: ${{ steps.stable-ref.outputs.version_name }}
      retention_days: ${{ steps.source.outputs.retention_days }}
      channel: ${{ steps.source.outputs.channel }}
      level: ${{ steps.source.outputs.level }}
      version_code_prefix: ${{ steps.source.outputs.version_code_prefix }}
    steps:
      - name: Resolve source
        id: source
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_CHANNEL: ${{ inputs.package_channel }}
          INPUT_SOURCE_REPOSITORY: ${{ inputs.source_repository }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
          INPUT_VERSION_NAME: ${{ inputs.version_name }}
          INPUT_RETENTION_DAYS: ${{ inputs.retention_days }}
          INPUT_VERSION_CODE_PREFIX: ${{ inputs.app_version_code_prefix }}
        run: |
          CHANNEL="${INPUT_CHANNEL:-preview}"

          if [ "$EVENT_NAME" = "schedule" ]; then
            case "$EVENT_SCHEDULE" in
              "0 16 * * *") CHANNEL="preview" ;;
              "20 16 * * *") CHANNEL="stable" ;;
              "40 16 * * *") CHANNEL="unstable" ;;
              *) echo "Unsupported schedule: $EVENT_SCHEDULE"; exit 1 ;;
            esac
          fi

          case "$CHANNEL" in
            preview)
              LEVEL="Preview"
              DEFAULT_REF="dev"
              ;;
            stable)
              LEVEL="Stable"
              DEFAULT_REF="latest-stable"
              ;;
            unstable)
              LEVEL="Unstable"
              DEFAULT_REF="dev"
              ;;
            *)
              echo "Unsupported package_channel: $CHANNEL"
              exit 1
              ;;
          esac

          echo "repository=${INPUT_SOURCE_REPOSITORY:-wxxsfxyzm/InstallerX-Revived}" >> "$GITHUB_OUTPUT"
          echo "requested_ref=${INPUT_SOURCE_REF:-$DEFAULT_REF}" >> "$GITHUB_OUTPUT"
          echo "version_name=${INPUT_VERSION_NAME:-}" >> "$GITHUB_OUTPUT"
          echo "retention_days=${INPUT_RETENTION_DAYS:-30}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"
          echo "level=${LEVEL}" >> "$GITHUB_OUTPUT"
          echo "version_code_prefix=${INPUT_VERSION_CODE_PREFIX:-99999}" >> "$GITHUB_OUTPUT"

      - name: Resolve stable ref
        id: stable-ref
        env:
          SOURCE_REPOSITORY: ${{ steps.source.outputs.repository }}
          REQUESTED_REF: ${{ steps.source.outputs.requested_ref }}
          VERSION_NAME: ${{ steps.source.outputs.version_name }}
          CHANNEL: ${{ steps.source.outputs.channel }}
        run: |
          RESOLVED_REF="${REQUESTED_REF}"
          RESOLVED_VERSION="${VERSION_NAME}"

          if [ "$CHANNEL" = "stable" ] && { [ -z "$RESOLVED_REF" ] || [ "$RESOLVED_REF" = "latest-stable" ]; }; then
            RESOLVED_REF="$(git ls-remote --tags --refs "https://github.com/${SOURCE_REPOSITORY}.git" \
              | awk -F/ '{print $NF}' \
              | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' \
              | sort -V \
              | tail -n 1)"

            if [ -z "$RESOLVED_REF" ]; then
              echo "ERROR: Could not resolve a stable tag from ${SOURCE_REPOSITORY}."
              exit 1
            fi

            if [ -z "$RESOLVED_VERSION" ]; then
              RESOLVED_VERSION="$RESOLVED_REF"
            fi
          fi

          echo "ref=${RESOLVED_REF}" >> "$GITHUB_OUTPUT"
          echo "version_name=${RESOLVED_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.source.outputs.repository }}
          fetch-depth: 1
          ref: ${{ steps.stable-ref.outputs.ref }}

      - name: Get source commit
        id: sha
        run: echo "upstream_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore successful-build marker
        id: restore-marker
        uses: actions/cache/restore@v4
        with:
          path: .ci-cache/packageinstaller-online-${{ steps.source.outputs.channel }}
          key: packageinstaller-online-${{ steps.source.outputs.channel }}-${{ steps.sha.outputs.upstream_sha }}

      - name: Decide whether to build
        id: decision
        env:
          CACHE_HIT: ${{ steps.restore-marker.outputs.cache-hit }}
          FORCE_REBUILD: ${{ inputs.force_rebuild }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          SHOULD_BUILD=true

          if [ "${CACHE_HIT}" = "true" ]; then
            if [ "$EVENT_NAME" = "schedule" ]; then
              SHOULD_BUILD=false
            elif [ "${FORCE_REBUILD:-false}" != "true" ]; then
              SHOULD_BUILD=false
            fi
          fi

          echo "should_build=${SHOULD_BUILD}" >> "$GITHUB_OUTPUT"
          echo "Source commit: ${{ steps.sha.outputs.upstream_sha }}"
          echo "Cache hit: ${CACHE_HIT:-false}"
          echo "Should build: ${SHOULD_BUILD}"

  packageinstaller-build:
    name: PackageInstaller ${{ needs.packageinstaller-preflight.outputs.channel }} / ${{ matrix.label }}
    needs: packageinstaller-preflight
    if: needs.packageinstaller-preflight.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: AOSP Package Installer
            module_variant: AOSP
            artifact_suffix: android-packageinstaller
            app_id: com.android.packageinstaller
          - label: Google Package Installer
            module_variant: Google
            artifact_suffix: google-packageinstaller
            app_id: com.google.android.packageinstaller
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          repository: ${{ needs.packageinstaller-preflight.outputs.source_repository }}
          fetch-depth: 0
          ref: ${{ needs.packageinstaller-preflight.outputs.upstream_sha }}

      - name: Checkout CI scripts
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          path: .ci-workflow
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Inject CI versionCode prefix support
        run: |
          python3 <<'PY'
          from pathlib import Path

          build_config = Path("build-plugins/src/main/kotlin/BuildConfig.kt")
          app_gradle = Path("app/build.gradle.kts")

          version_code_helper = r'''
          fun Project.getVersionCode(): Int {
              val explicitVersionCode = providers.gradleProperty("VERSION_CODE")
                  .orElse(providers.environmentVariable("VERSION_CODE"))
                  .orNull
                  ?.trim()
                  ?.takeIf { it.isNotEmpty() }

              if (explicitVersionCode != null) {
                  return explicitVersionCode.toIntOrNull()
                      ?: error("VERSION_CODE must be an integer: $explicitVersionCode")
              }

              val baseVersionCode = getGitCommitCount()
              val versionCodePrefix = providers.gradleProperty("VERSION_CODE_PREFIX")
                  .orElse(providers.environmentVariable("VERSION_CODE_PREFIX"))
                  .orNull
                  ?.trim()
                  ?.takeIf { it.isNotEmpty() }
                  ?: return baseVersionCode

              require(versionCodePrefix.all { it.isDigit() }) {
                  "VERSION_CODE_PREFIX must contain only digits: $versionCodePrefix"
              }

              val prefixedVersionCode = "$versionCodePrefix$baseVersionCode".toLong()
              require(prefixedVersionCode <= Int.MAX_VALUE) {
                  "Prefixed VERSION_CODE $prefixedVersionCode exceeds ${Int.MAX_VALUE}"
              }

              return prefixedVersionCode.toInt()
          }
          '''

          build_config_text = build_config.read_text(encoding="utf-8")
          if "fun Project.getVersionCode()" not in build_config_text:
              marker = "\n// Get git commit hash safely"
              if marker not in build_config_text:
                  raise SystemExit("Could not find insertion point in BuildConfig.kt")
              build_config.write_text(
                  build_config_text.replace(marker, "\n" + version_code_helper.strip() + "\n" + marker, 1),
                  encoding="utf-8",
              )

          app_gradle_text = app_gradle.read_text(encoding="utf-8")
          if "versionCode = project.getGitCommitCount()" in app_gradle_text:
              app_gradle.write_text(
                  app_gradle_text.replace(
                      "versionCode = project.getGitCommitCount()",
                      "versionCode = project.getVersionCode()",
                      1,
                  ),
                  encoding="utf-8",
              )
          elif "versionCode = project.getVersionCode()" not in app_gradle_text:
              raise SystemExit("Could not find versionCode assignment in app/build.gradle.kts")
          PY

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: '25'

      - name: Use CI-provided JDK for Gradle
        run: rm -f gradle/gradle-daemon-jvm.properties

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          build-scan-terms-of-use-url: https://gradle.com/help/legal-terms-of-use
          build-scan-terms-of-use-agree: 'yes'
          build-scan-publish: false
          cache-read-only: ${{ github.ref_name != 'main' }}
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Decode and set up signing key
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          if [ -z "${SIGNING_STORE_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_STORE_BASE64:-}" ] || [ -z "${SIGNING_KEY_PASSWORD:-}" ] || [ -z "${SIGNING_KEY_ALIAS:-}" ]; then
            echo "Signing secrets are incomplete. The project will fall back to the debug keystore."
            exit 0
          fi
          mkdir -p keystore
          echo "${SIGNING_KEY_STORE_BASE64}" | base64 --decode > keystore/carlyu.jks
          echo "storeFile=keystore/carlyu.jks" > keystore.properties
          echo "keyAlias=${SIGNING_KEY_ALIAS}" >> keystore.properties
          echo "keyPassword=${SIGNING_KEY_PASSWORD}" >> keystore.properties
          echo "storePassword=${SIGNING_STORE_PASSWORD}" >> keystore.properties

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build online PackageInstaller APK
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_ID: ${{ matrix.app_id }}
          VERSION_NAME: ${{ needs.packageinstaller-preflight.outputs.version_name }}
          VERSION_CODE_PREFIX: ${{ needs.packageinstaller-preflight.outputs.version_code_prefix }}
          LEVEL: ${{ needs.packageinstaller-preflight.outputs.level }}
        run: |
          VERSION_ARGS=()
          if [ -n "${VERSION_NAME:-}" ]; then
            VERSION_ARGS=(-PVERSION_NAME="${VERSION_NAME}")
          fi

          ./gradlew "assembleOnline${LEVEL}Release" -PAPP_ID="${APP_ID}" "${VERSION_ARGS[@]}"

      - name: Rename APK
        id: apk
        env:
          ARTIFACT_SUFFIX: ${{ matrix.artifact_suffix }}
          APP_ID: ${{ matrix.app_id }}
          VERSION_NAME: ${{ needs.packageinstaller-preflight.outputs.version_name }}
          LEVEL: ${{ needs.packageinstaller-preflight.outputs.level }}
          CHANNEL: ${{ needs.packageinstaller-preflight.outputs.channel }}
        run: |
          APK_DIR="app/build/outputs/apk/online${LEVEL}/release"
          ORIGINAL_APK=$(find "$APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)

          if [ -z "$ORIGINAL_APK" ]; then
            echo "ERROR: APK not found in $APK_DIR."
            ls -R app/build/outputs/apk || true
            exit 1
          fi

          if [ -n "${VERSION_NAME:-}" ]; then
            VERSION_TAG="${VERSION_NAME}"
          else
            VERSION_TAG="$(git log -1 --format=%cd --date=format:%y.%m)"
          fi

          SAFE_APP_ID="${APP_ID//./-}"
          NEW_APK_NAME="InstallerX-Revived-online-${CHANNEL}-${ARTIFACT_SUFFIX}-${VERSION_TAG}.apk"
          NEW_APK_PATH="${APK_DIR}/${NEW_APK_NAME}"
          mv "$ORIGINAL_APK" "$NEW_APK_PATH"

          echo "apk_path=${NEW_APK_PATH}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${NEW_APK_NAME}" >> "$GITHUB_OUTPUT"
          echo "safe_app_id=${SAFE_APP_ID}" >> "$GITHUB_OUTPUT"
          echo "version_tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build module ZIP
        id: module
        env:
          APK_PATH: ${{ steps.apk.outputs.apk_path }}
          APP_ID: ${{ matrix.app_id }}
          MODULE_VARIANT: ${{ matrix.module_variant }}
          VERSION_TAG: ${{ steps.apk.outputs.version_tag }}
          CHANNEL: ${{ needs.packageinstaller-preflight.outputs.channel }}
        run: bash .ci-workflow/.github/scripts/build-packageinstaller-module.sh

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.apk.outputs.safe_app_id }}-online-${{ needs.packageinstaller-preflight.outputs.channel }}-apk
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: ${{ needs.packageinstaller-preflight.outputs.retention_days }}
          archive: false

      - name: Upload module ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.module_variant }}-${{ steps.apk.outputs.version_tag }}-online-${{ needs.packageinstaller-preflight.outputs.channel }}-module
          path: ${{ steps.module.outputs.module_path }}
          retention-days: ${{ needs.packageinstaller-preflight.outputs.retention_days }}
          archive: false

  packageinstaller-remember-success:
    name: Remember PackageInstaller source commit
    needs:
      - packageinstaller-preflight
      - packageinstaller-build
    if: >
      needs.packageinstaller-preflight.outputs.should_build == 'true' &&
      needs.packageinstaller-preflight.outputs.cache_hit != 'true' &&
      success()
    runs-on: ubuntu-latest
    steps:
      - name: Create successful-build marker
        run: |
          mkdir -p ".ci-cache/packageinstaller-online-${{ needs.packageinstaller-preflight.outputs.channel }}"
          echo "${{ needs.packageinstaller-preflight.outputs.upstream_sha }}" > ".ci-cache/packageinstaller-online-${{ needs.packageinstaller-preflight.outputs.channel }}/source-sha"

      - name: Save successful-build marker
        uses: actions/cache/save@v4
        with:
          path: .ci-cache/packageinstaller-online-${{ needs.packageinstaller-preflight.outputs.channel }}
          key: packageinstaller-online-${{ needs.packageinstaller-preflight.outputs.channel }}-${{ needs.packageinstaller-preflight.outputs.upstream_sha }}
